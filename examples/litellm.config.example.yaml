# Example LiteLLM config for local Ollama use with vdc-tools.
# Copy to ~/.vdc-tools/state/litellm.config.yaml and adjust model tags as needed.

model_list:
  # Claude Code may issue a background title-generation request against this model
  # name before your main prompt runs. A fast text-only local model is sufficient.
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: ollama/llama3:latest
      api_base: http://127.0.0.1:11434

  # Main interactive model example. Pick a tool-capable Ollama model here.
  - model_name: qwen3:8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://127.0.0.1:11434

litellm_settings:
  master_key: ollama
